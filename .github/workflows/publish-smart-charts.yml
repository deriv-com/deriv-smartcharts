name: Publish @deriv-com/smartcharts-champion
on:
    workflow_dispatch:

jobs:
    build_and_publish_smart_charts:
        runs-on: Ubuntu-latest
        env:
          HUSKY: 0  # Disable Husky hooks
        permissions:
            contents: write
        steps:
            - name: Checkout deriv-smartcharts
              uses: 'deriv-com/deriv-smartcharts/.github/actions/checkout@master'
              with:
                  repository: 'deriv-com/deriv-smartcharts'
                  path: deriv-smartcharts
                  ref: master

            - name: Custom flutter-chart
              id: flutter_chart
              uses: 'deriv-com/deriv-smartcharts/.github/actions/checkout@master'
              with:
                  repository: 'deriv-com/flutter-chart'
                  path: flutter-chart
                  ref: master
            - uses: subosito/flutter-action@62f096cacda5168a3bd7b95793373be14fa4fbaf
              with:
                  flutter-version: '3.24.1'
                  channel: 'stable'
                  cache: true
            - name: Build flutter
              run: |
                  cd deriv-smartcharts/chart_app
                  flutter pub get
                  flutter build web --wasm --release

            - name: Setup node
              uses: actions/setup-node@efcb663fc60e97218a2b2d6d827f7830f164739e
              with:
                  node-version: 22.x

            - name: Setup deriv-smartcharts
              run: cd deriv-smartcharts && npm install

            - name: Build deriv-smartcharts
              run: cd deriv-smartcharts && npm run build
            - name: Release deriv-smartcharts
              env:
                  CI: true
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
              run: cd deriv-smartcharts && npx semantic-release
