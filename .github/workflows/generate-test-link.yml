name: Generate Test Link
on:
    pull_request:
        types: [opened, synchronize, reopened]

concurrency:
    group: github-pages-build-${{ github.head_ref || github.ref_name }}
    cancel-in-progress: true

env:
    FLUTTER_VERSION: '3.24.1'
    NODE_VERSION: '18.x'
    FLUTTER_WEB_RENDERER: 'html'
    NODE_ENV: 'development'
    HUSKY: 0
    CI: true

jobs:
    build_and_deploy:
        runs-on: ubuntu-latest
        permissions:
            contents: write
            checks: write
            pull-requests: write
            pages: write
        steps:
            - name: Checkout PR branch
              uses: actions/checkout@v4
              with:
                  repository: ${{ github.event.pull_request.head.repo.full_name }}
                  ref: ${{ github.event.pull_request.head.ref }}
                  token: ${{ secrets.GITHUB_TOKEN }}

            - name: Verify checkout
              run: |
                  echo "Current branch: $(git branch --show-current)"
                  echo "Last commit: $(git log -1 --oneline)"

            # Add your build steps here
            - name: Setup Flutter
              uses: subosito/flutter-action@48cafc24713cca54bbe03cdc3a423187d413aafa
              with:
                  flutter-version: ${{ env.FLUTTER_VERSION }}

            - name: Build Flutter web
              run: |
                cd chart_app
                flutter pub get
                flutter build web --web-renderer=${{ env.FLUTTER_WEB_RENDERER }} --release

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: 'npm'
            
            - name: Install dependencies
              run: |
                npm ci
    
            - name: Build SmartCharts Champion
              shell: bash
              run: |
                npm run build:app
            - name: Configure Git
              shell: bash
              run: |
                git config --global user.name "GitHub Actions"
                git config --global user.email "github-actions@users.noreply.github.com"
                # Set origin to the head repository (where we have write permissions)
                git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.event.pull_request.head.repo.full_name }}.git

            - name: Deploy to GitHub Pages
              shell: bash
              run: |
                echo "🚀 Generating test link for PR #${{ github.event.pull_request.number }}"
                BRANCH_NAME="pr-${{ github.event.pull_request.number }}"
                HEAD_REPO_OWNER="${{ github.event.pull_request.head.repo.owner.login }}"
                HEAD_REPO_NAME="${{ github.event.pull_request.head.repo.name }}"
                TEST_LINK="https://${HEAD_REPO_OWNER}.github.io/${HEAD_REPO_NAME}/pr/${{ github.event.pull_request.number }}"
                
                # Set environment variables for later steps
                echo "TEST_LINK=$TEST_LINK" >> $GITHUB_ENV
                echo "BRANCH_NAME=$BRANCH_NAME" >> $GITHUB_ENV
                
                echo "📦 Deploying to branch: $BRANCH_NAME"
                echo "🔗 Target URL: $TEST_LINK"
                echo "📍 Deploying to repository: ${HEAD_REPO_OWNER}/${HEAD_REPO_NAME}"
                
                # Verify build artifacts exist
                if [ ! -f "index.html" ]; then
                  echo "❌ Error: index.html not found. Build may have failed."
                  exit 1
                fi
                
                if [ ! -d "dist" ]; then
                  echo "❌ Error: dist directory not found. Build may have failed."
                  exit 1
                fi
                
                # Deploy to gh-pages with proper authentication and configuration
                echo "📤 Deploying to GitHub Pages..."
                
                # Deploy to the head repository where we have permissions
                npx gh-pages \
                  --dist '.' \
                  --src '{index.html,manifest.json,sw.js,dist/**,CNAME,Dockerfile,.dockerignore,default.conf,.circleci/**}' \
                  --dest "$BRANCH_NAME" \
                  --dotfiles \
                  --user "GitHub Actions <github-actions@users.noreply.github.com>" \
                  --message "Deploy PR #${{ github.event.pull_request.number }} - ${{ github.event.pull_request.title }}"
                
                if [ $? -eq 0 ]; then
                  echo "✅ Successfully deployed to: $TEST_LINK"
                  echo "⏱️  Note: It may take a few minutes for the site to be available."
                else
                  echo "❌ Deployment failed"
                  exit 1
                fi

            - name: Comment PR with test link
              uses: actions/github-script@v7
              with:
                github-token: ${{ secrets.GITHUB_TOKEN }}
                script: |
                  const testLink = process.env.TEST_LINK;
                  const prNumber = context.payload.pull_request.number;
                  
                  // Check if we already commented
                  const comments = await github.rest.issues.listComments({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: prNumber,
                  });
                  
                  const botComment = comments.data.find(comment => 
                    comment.user.type === 'Bot' && 
                    comment.body.includes('🚀 Test Link Generated')
                  );
                  
                  const commentBody = `🚀 **Test Link Generated**
                  
                  Your PR preview is ready! You can test your changes at:
                  
                  **[📱 View Test Link](${testLink})**
                  
                  This link will be updated automatically when you push new commits to this PR.
                  
                  ---
                  *Generated by GitHub Actions for PR #${prNumber}*`;
                  
                  if (botComment) {
                    // Update existing comment
                    await github.rest.issues.updateComment({
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      comment_id: botComment.id,
                      body: commentBody
                    });
                  } else {
                    // Create new comment
                    await github.rest.issues.createComment({
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      issue_number: prNumber,
                      body: commentBody
                    });
                  }
